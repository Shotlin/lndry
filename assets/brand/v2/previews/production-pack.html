<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>LNDRY production asset pack</title>
  <style>
    *{box-sizing:border-box} body{margin:0;background:#f4f3fb;color:#080f14;font-family:Inter,Arial,sans-serif}
    main{width:1600px;padding:48px} header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:36px}
    h1{margin:0;font:600 34px/1.15 Sora,Inter,sans-serif;letter-spacing:-.025em}
    header p{margin:10px 0 0;color:#596273;font-size:15px}.tag{padding:9px 14px;border-radius:999px;background:#eae8ff;color:#5046c8;font-weight:600}
    h2{margin:38px 0 18px;font:600 22px/1.2 Sora,Inter,sans-serif}
    .banners{display:grid;gap:16px}.banner{width:100%;border:1px solid #e7e8f0;border-radius:20px;background:#fff;box-shadow:0 4px 16px rgba(42,36,95,.08)}
    .screens{display:grid;grid-template-columns:repeat(5,1fr);gap:18px;align-items:start}
    figure{margin:0;padding:10px;border:1px solid #e7e8f0;border-radius:20px;background:#fff;box-shadow:0 4px 16px rgba(42,36,95,.08)}
    figure img{display:block;width:100%;border-radius:12px} figcaption{padding:12px 4px 5px;color:#495467;font-size:13px;font-weight:600}
    footer{margin-top:30px;color:#7e8998;font-size:12px}
  </style>
</head>
<body>
<main>
  <header>
    <div><h1>LNDRY production asset pack</h1><p>Essential banners and customer-flow mockups · built from the approved UI sheet</p></div>
    <div class="tag">Careline Marketplace · V2</div>
  </header>
  <h2>In-app banners</h2>
  <section class="banners">
    <img class="banner" src="../banners/first-pickup-v1.png" alt="">
    <img class="banner" src="../banners/compare-partners-v1.png" alt="">
    <img class="banner" src="../banners/care-process-v1.png" alt="">
  </section>
  <h2>Customer journey</h2>
  <section class="screens">
    <figure><img src="../mockups/onboarding-convenience-v1.png" alt=""><figcaption>Onboarding</figcaption></figure>
    <figure><img src="../mockups/sign-in-mobile-v1.png" alt=""><figcaption>Mobile sign-in</figcaption></figure>
    <figure><img src="../mockups/otp-verification-v1.png" alt=""><figcaption>OTP verification</figcaption></figure>
    <figure><img src="../mockups/location-serviceability-v1.png" alt=""><figcaption>Location</figcaption></figure>
    <figure><img src="../mockups/review-order-v1.png" alt=""><figcaption>Review order</figcaption></figure>
    <figure><img src="../mockups/schedule-pickup-v1.png" alt=""><figcaption>Schedule pickup</figcaption></figure>
    <figure><img src="../mockups/payment-v1.png" alt=""><figcaption>Payment</figcaption></figure>
    <figure><img src="../mockups/order-confirmation-v1.png" alt=""><figcaption>Confirmation</figcaption></figure>
    <figure><img src="../mockups/track-order-v1.png" alt=""><figcaption>Tracking</figcaption></figure>
    <figure><img src="../mockups/order-delivered-v1.png" alt=""><figcaption>Delivered</figcaption></figure>
    <figure><img src="../mockups/order-history-v1.png" alt=""><figcaption>Order history</figcaption></figure>
    <figure><img src="../mockups/help-support-v1.png" alt=""><figcaption>Help &amp; support</figcaption></figure>
    <figure><img src="../mockups/state-empty-orders-v1.png" alt=""><figcaption>Empty orders</figcaption></figure>
    <figure><img src="../mockups/state-no-service-area-v1.png" alt=""><figcaption>Outside service area</figcaption></figure>
    <figure><img src="../mockups/state-offline-v1.png" alt=""><figcaption>Offline</figcaption></figure>
    <figure><img src="../mockups/state-payment-failure-v1.png" alt=""><figcaption>Payment failure</figcaption></figure>
  </section>
  <footer>Only required product assets are included. Additional icons remain deferred until implementation proves they are needed.</footer>
</main>
</body>
</html>
