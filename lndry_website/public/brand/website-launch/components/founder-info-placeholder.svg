    </filter>
    <style>
      .display{font-family:Sora,Inter,Arial,sans-serif;font-size:46px;font-weight:700;letter-spacing:-1.2px;fill:#080F14}
      .title{font-family:Sora,Inter,Arial,sans-serif;font-size:25px;font-weight:700;letter-spacing:-.25px;fill:#080F14}
      .body{font-family:Inter,Arial,sans-serif;font-size:17px;font-weight:500;fill:#495467}
      .label{font-family:Inter,Arial,sans-serif;font-size:13px;font-weight:700;fill:#495467}
      .caption{font-family:Inter,Arial,sans-serif;font-size:12px;font-weight:700;fill:#7E8998}
      .tiny{font-family:Inter,Arial,sans-serif;font-size:11px;font-weight:700;fill:#7E8998}
    </style>
  </defs>
  <rect width="1200" height="640" rx="0" fill="url(#bg)"/>
  <path d="M82 92 C162 42 235 58 304 116 C377 178 470 165 528 102" stroke="#EAE8FF" stroke-width="22" stroke-linecap="round" opacity=".72"/>
  <path d="M77 532 L77 582 L127 582" stroke="#6C63E8" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="146" cy="582" r="7" fill="#0FB5A6"/>
  <path d="M103 554 h18 M103 568 h18 M103 582 h18" stroke="#5046C8" stroke-width="4" stroke-linecap="round"/>
  <text x="72" y="92" class="caption">LNDRY launch asset</text>
  <text x="72" y="148" class="display">Founder information</text>
  <text x="74" y="190" class="body">A premium founder block without inventing biography.</text>
  <text x="74" y="220" class="body">Use real founder name, photo, and note before publishing.</text>
  
    <g transform="translate(588 96)">
      <rect width="536" height="416" rx="28" fill="#fff" stroke="#E7E8F0" filter="url(#soft)"/>
      <circle cx="104" cy="104" r="58" fill="#EAE8FF" stroke="#6C63E8" stroke-width="5"/>
      <path d="M78 116 C92 88 118 88 132 116" stroke="#6C63E8" stroke-width="7" stroke-linecap="round"/>
