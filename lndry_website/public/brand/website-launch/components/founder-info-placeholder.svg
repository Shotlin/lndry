      <text x="190" y="78" class="title">Founder name</text>
      <text x="190" y="112" class="body">Founder, LNDRY</text>
      <rect x="190" y="136" width="174" height="38" rx="19" fill="#FFFFFF" stroke="#6C63E8"/>
  <circle cx="212" cy="155" r="5" fill="#6C63E8"/>
  <text x="228" y="160" class="label" fill="#5046C8">Pune based</text>
      <rect x="48" y="208" width="440" height="128" rx="20" fill="#F4F3FB" stroke="#E7E8F0"/>
      <text x="76" y="250" class="body">Add a short human note about why LNDRY exists,</text>
